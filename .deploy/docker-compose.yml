# ============================================================================
# ZEA Thalamus - Production Docker Compose
# ============================================================================
# This file is used by the deploy.sh script for production deployment
# Environment variables are loaded from .env file
# ============================================================================

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: thalamus_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - thalamus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    command: postgres -c max_connections=200 -c shared_buffers=256MB

  # ==========================================================================
  # Redis Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: thalamus_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - thalamus_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ==========================================================================
  # Thalamus Application
  # ==========================================================================
  thalamus:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: thalamus_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: "ecto://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POOL_SIZE: 20

      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Application
      MIX_ENV: prod
      PHX_SERVER: "true"
      PHX_HOST: ${DOMAIN}
      PHX_PORT: 4000
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}

      # Security Tokens
      VERIFICATION_TOKEN_SECRET: ${VERIFICATION_TOKEN_SECRET}
      PASSWORD_RESET_SECRET: ${PASSWORD_RESET_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}

      # Email
      EMAIL_MODE: production
      FROM_EMAIL: ${EMAIL_FROM}
      FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_BASE_URL: ${EMAIL_BASE_URL}

      # Email SMTP (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Security
      ENABLE_SSL: "true"
      FORCE_SSL: "true"
    ports:
      - "${API_PORT}:4000"
    networks:
      - thalamus_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 768M

# ============================================================================
# Networks
# ============================================================================
networks:
  thalamus_network:
    driver: bridge
    name: thalamus_network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
    name: thalamus_postgres_prod_data
  redis_data:
    driver: local
    name: thalamus_redis_prod_data
