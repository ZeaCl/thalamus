version: '3.9'

services:
  thalamus:
    image: ghcr.io/zeacl/thalamus:latest
    container_name: thalamus_app
    restart: unless-stopped
    networks:
      - thalamus_network
    environment:
      MIX_ENV: prod
      # Aquí usamos ${VARIABLE}, Docker buscará estos valores en tu archivo .env
      DATABASE_URL: "ecto://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      PHX_SERVER: "true"
      PHX_HOST: "${PHX_HOST}"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: thalamus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - thalamus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: thalamus_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - thalamus_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  thalamus_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: