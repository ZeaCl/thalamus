version: '3.9'

# ============================================================================
# ZEA Thalamus - Production Docker Compose Override
# ============================================================================
# This file overrides docker-compose.yml settings for production deployment.
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# IMPORTANT: Update all environment variables with production values!
# ============================================================================

services:
  # ==========================================================================
  # PostgreSQL Database (Production)
  # ==========================================================================
  postgres:
    environment:
      POSTGRES_DB: thalamus_prod
      POSTGRES_USER: ${DB_USER:-thalamus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    command: postgres -c max_connections=200 -c shared_buffers=256MB

  # ==========================================================================
  # Redis Cache (Production)
  # ==========================================================================
  redis:
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Redis password required} --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ==========================================================================
  # Thalamus Application (Production)
  # ==========================================================================
  thalamus:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      # Database
      DATABASE_URL: "ecto://${DB_USER}:${DB_PASSWORD}@postgres:5432/thalamus_prod"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: thalamus_prod
      DB_USER: ${DB_USER:-thalamus}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DB_POOL_SIZE: 20

      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis password required}

      # Application
      MIX_ENV: prod
      PHX_SERVER: "true"
      PHX_HOST: ${PHX_HOST:?Phoenix host required}
      PHX_PORT: 4000
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Secret key base required (min 64 chars)}

      # Security Tokens
      VERIFICATION_TOKEN_SECRET: ${VERIFICATION_TOKEN_SECRET:?Verification token secret required}
      PASSWORD_RESET_SECRET: ${PASSWORD_RESET_SECRET:?Password reset secret required}
      SESSION_SECRET: ${SESSION_SECRET:?Session secret required}

      # Email (Production)
      EMAIL_MODE: production
      EMAIL_FROM: ${EMAIL_FROM:-noreply@thalamus.example.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-ZEA Thalamus}
      EMAIL_BASE_URL: ${EMAIL_BASE_URL:?Email base URL required}

      # Email SMTP (if using external SMTP)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS origins required}

      # Logging
      LOG_LEVEL: warning

      # Security
      ENABLE_SSL: "true"
      FORCE_SSL: "true"
    command: bin/thalamus start
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ==========================================================================
  # Nginx Reverse Proxy (Production)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: thalamus_nginx
    depends_on:
      - thalamus
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - thalamus_network
    restart: always

  # Remove development tools in production
  adminer:
    profiles: ["debug"]

  redis_commander:
    profiles: ["debug"]

# ============================================================================
# Production Volumes
# ============================================================================
volumes:
  postgres_prod_data:
    driver: local
    name: thalamus_postgres_prod_data
  nginx_cache:
    driver: local
    name: thalamus_nginx_cache
