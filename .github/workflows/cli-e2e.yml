name: CLI E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'lib/**'
      - 'priv/**'
      - 'config/**'
      - 'mix.exs'
      - 'mix.lock'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'test/cli/**'
      - 'scripts/test-cli.sh'
      - 'docs/cli/**'
      - '.github/workflows/cli-e2e.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'lib/**'
      - 'priv/**'
      - 'config/**'
      - 'mix.exs'
      - 'mix.lock'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'test/cli/**'
      - 'scripts/test-cli.sh'
      - 'docs/cli/**'
      - '.github/workflows/cli-e2e.yml'

jobs:
  e2e:
    name: CLI E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout thalamus
        uses: actions/checkout@v4

      - name: Checkout zea-cli
        uses: actions/checkout@v4
        with:
          repository: ZeaCl/zea-cli
          path: zea-cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: zea-cli/package-lock.json

      - name: Install zea-cli
        working-directory: zea-cli
        run: |
          npm ci
          npm link
          zea --version

      - name: Start Thalamus
        run: |
          echo "Building Thalamus (this can take 5+ minutes in CI)..."
          docker compose build thalamus
          docker compose up -d --wait postgres redis
          docker compose up -d --wait thalamus
          echo "Waiting for Thalamus to be fully ready (up to 3 minutes)..."
          curl -fsS --retry 30 --retry-delay 6 --retry-connrefused http://localhost:4100/api/public/health
          echo "✅ Thalamus ready"

      # ── Health + OIDC ─────────────────────────────
      - name: Test — health
        run: |
          zea thalamus health 2>&1 | tee /dev/stderr | grep -q "ok"
          echo "✅ health"

      - name: Test — whoami (unauthenticated)
        run: |
          zea thalamus auth whoami 2>&1 | tee /dev/stderr | grep -qi "not authenticated\|login"
          echo "✅ whoami (unauthenticated)"

      # ── Auth ──────────────────────────────────────
      - name: Test — login
        run: |
          zea thalamus auth login --email admin@zea.local --password Admin123! 2>&1 | tee /dev/stderr | grep -q "Successfully"
          echo "✅ login"

      - name: Test — whoami (authenticated)
        run: |
          zea thalamus auth whoami 2>&1 | tee /dev/stderr | grep -q "admin@zea.local"
          echo "✅ whoami"

      - name: Test — org
        run: |
          zea thalamus org list 2>&1 | tee /dev/stderr | grep -q "ZEA"
          echo "✅ org list"

      - name: Test — token
        run: |
          zea thalamus token create --name "CI Test" 2>&1 | tee /dev/stderr | grep -q "Token"
          echo "✅ token create"

      - name: Test — client
        run: |
          zea thalamus client list 2>&1 | tee /dev/stderr | grep -q "Client\|No OAuth2"
          echo "✅ client list"

      - name: Test — debug
        run: |
          TOKEN=$(cat ~/.config/zea/config.json | jq -r '.token')
          zea thalamus auth debug "$TOKEN" 2>&1 | tee /dev/stderr | grep -q "Payload\|active"
          echo "✅ auth debug"

      - name: Test — oidc
        run: |
          zea thalamus oidc discovery --output json 2>&1 | tee /dev/stderr | grep -q "issuer"
          echo "✅ oidc discovery"

      # ── Error cases ───────────────────────────────
      - name: Test — invalid login
        run: |
          zea thalamus auth login --email noexiste@test.com --password wrong 2>&1 | tee /dev/stderr | grep -qi "invalid\|failed"
          echo "✅ invalid login rejected"

      - name: Test — 404
        run: |
          zea thalamus user show 00000000-0000-0000-0000-000000000000 2>&1 | tee /dev/stderr | grep -qi "not found"
          echo "✅ 404 handled"

      # ── Teardown ──────────────────────────────────
      - name: Thalamus logs
        if: failure()
        run: docker compose logs thalamus --tail 50

      - name: Teardown
        if: always()
        run: docker compose down -v
