name: CLI E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'lib/**'
      - 'priv/**'
      - 'config/**'
      - 'mix.exs'
      - 'mix.lock'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'test/cli/**'
      - 'scripts/test-cli.sh'
      - 'docs/cli/**'
      - '.github/workflows/cli-e2e.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'lib/**'
      - 'priv/**'
      - 'config/**'
      - 'mix.exs'
      - 'mix.lock'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'test/cli/**'
      - 'scripts/test-cli.sh'
      - 'docs/cli/**'
      - '.github/workflows/cli-e2e.yml'

jobs:
  e2e:
    name: CLI E2E (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - "01_health"
          - "02_auth"
          - "03_org"
          - "04_client"
          - "05_token"
          - "06_domain"
          - "07_doctor"
          - "08_errors"

    steps:
      - name: Checkout thalamus
        uses: actions/checkout@v4

      - name: Checkout zea-cli
        uses: actions/checkout@v4
        with:
          repository: ZeaCl/zea-cli
          path: zea-cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: zea-cli/package-lock.json

      - name: Install zea-cli
        working-directory: zea-cli
        run: |
          npm ci
          npm link
          which zea && zea --version || echo "zeal CLI linked"

      - name: Start Thalamus
        run: |
          docker compose up -d --wait postgres redis
          docker compose up -d --wait thalamus
          sleep 5
          curl -s http://localhost:4100/api/public/health | jq .

      - name: Run test suite — ${{ matrix.suite }}
        run: ./scripts/test-cli.sh ${{ matrix.suite }} --verbose
        env:
          TEST_THALAMUS_URL: http://localhost:4100
          CLI_PATH: zea

      - name: Thalamus logs
        if: failure()
        run: docker compose logs thalamus --tail 100

      - name: Teardown
        if: always()
        run: docker compose down -v
