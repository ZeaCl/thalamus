name: CLI E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'lib/**'
      - 'priv/**'
      - 'config/**'
      - 'mix.exs'
      - 'mix.lock'
      - 'cli/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - 'test/cli/**'
      - 'scripts/test-cli.sh'
      - 'docs/cli/**'
      - '.github/workflows/cli-e2e.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'lib/**'
      - 'priv/**'
      - 'config/**'
      - 'cli/**'
      - 'mix.exs'
      - 'mix.lock'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - 'test/cli/**'
      - 'scripts/test-cli.sh'
      - 'docs/cli/**'
      - '.github/workflows/cli-e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: CLI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout thalamus
        uses: actions/checkout@v4

      - name: Checkout zea-cli
        uses: actions/checkout@v4
        with:
          repository: ZeaCl/zea-cli
          path: zea-cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: zea-cli/package-lock.json

      - name: Install zea-cli
        working-directory: zea-cli
        run: |
          npm ci
          npm link
          zea --version

      - name: Build Thalamus image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          load: true
          tags: zea-thalamus:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Thalamus
        run: |
          echo "Starting Thalamus (CI mode)..."
          docker compose -f docker-compose.ci.yml down -v 2>/dev/null || true
          docker compose -f docker-compose.ci.yml up -d --wait
          echo "Waiting for Thalamus to finish migrations + seeds..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4100/api/public/health >/dev/null 2>&1; then
              echo "✅ Thalamus ready (${i}s)"
              break
            fi
            sleep 2
          done

      - name: Run CLI E2E tests
        run: bash scripts/test-cli.sh

      # ── Teardown ──────────────────────────────────
      - name: Thalamus logs
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs thalamus --tail 50

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
