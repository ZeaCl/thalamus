name: Examples E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'examples/**'
      - '.github/workflows/examples-e2e.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'examples/**'
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: thalamus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/e2e-tests/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: examples/python-fastapi/requirements.txt

      - name: Cache Elixir dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install Elixir dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Setup database
        env:
          MIX_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/thalamus_test
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Start Thalamus server
        env:
          MIX_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/thalamus_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE || 'test_secret_key_base_at_least_64_characters_long_for_testing_purposes_only' }}
          PHX_HOST: localhost
          PORT: 4000
        run: |
          mix phx.server &
          echo "Waiting for Thalamus server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:4000/api/public/health > /dev/null; then
              echo "Thalamus server is ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

      - name: Create test OAuth2 clients and user
        env:
          MIX_ENV: test
        run: |
          # Create test user
          mix run -e "
          alias Thalamus.Repo
          alias Thalamus.Infrastructure.Persistence.Schemas.UserSchema

          Repo.insert!(%UserSchema{
            id: Ecto.UUID.generate(),
            email: \"testuser@example.com\",
            password_hash: Bcrypt.hash_pwd_salt(\"testpass123\"),
            first_name: \"Test\",
            last_name: \"User\",
            is_active: true,
            email_confirmed: true,
            inserted_at: DateTime.utc_now(),
            updated_at: DateTime.utc_now()
          })
          "

          # Note: OAuth2 clients need to be created via API or manually
          # For CI, you might want to add a Mix task to seed test clients

      - name: Install React SPA dependencies
        working-directory: examples/react-spa
        run: |
          npm ci
          cp .env.example .env
          echo "VITE_THALAMUS_BASE_URL=http://localhost:4000" >> .env
          echo "VITE_THALAMUS_CLIENT_ID=test_client" >> .env
          echo "VITE_REDIRECT_URI=http://localhost:5173/callback" >> .env

      - name: Install Node.js Backend dependencies
        working-directory: examples/nodejs-backend
        run: |
          npm ci
          cp .env.example .env
          echo "THALAMUS_BASE_URL=http://localhost:4000" >> .env
          echo "THALAMUS_CLIENT_ID=test_nodejs_client" >> .env
          echo "THALAMUS_CLIENT_SECRET=test_secret" >> .env
          echo "PORT=3000" >> .env

      - name: Install Python FastAPI dependencies
        working-directory: examples/python-fastapi
        run: |
          pip install -r requirements.txt
          cp .env.example .env
          echo "THALAMUS_BASE_URL=http://localhost:4000" >> .env
          echo "THALAMUS_CLIENT_ID=test_python_client" >> .env
          echo "THALAMUS_CLIENT_SECRET=test_secret" >> .env
          echo "PORT=8000" >> .env

      - name: Start React SPA
        working-directory: examples/react-spa
        run: |
          npm run dev &
          echo "Waiting for React SPA..."
          for i in {1..30}; do
            if curl -s http://localhost:5173 > /dev/null; then
              echo "React SPA is ready"
              break
            fi
            sleep 2
          done

      - name: Start Node.js Backend
        working-directory: examples/nodejs-backend
        run: |
          npm start &
          echo "Waiting for Node.js Backend..."
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/public/health > /dev/null; then
              echo "Node.js Backend is ready"
              break
            fi
            sleep 2
          done

      - name: Start Python FastAPI
        working-directory: examples/python-fastapi
        run: |
          python main.py &
          echo "Waiting for Python FastAPI..."
          for i in {1..30}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "Python FastAPI is ready"
              break
            fi
            sleep 2
          done

      - name: Install E2E test dependencies
        working-directory: examples/e2e-tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Configure E2E tests
        working-directory: examples/e2e-tests
        run: |
          cp .env.example .env
          cat << EOF > .env
          THALAMUS_BASE_URL=http://localhost:4000
          TEST_USER_EMAIL=testuser@example.com
          TEST_USER_PASSWORD=testpass123
          REACT_SPA_CLIENT_ID=test_client
          NODEJS_CLIENT_ID=test_nodejs_client
          NODEJS_CLIENT_SECRET=test_secret
          PYTHON_CLIENT_ID=test_python_client
          PYTHON_CLIENT_SECRET=test_secret
          REACT_SPA_PORT=5173
          NODEJS_PORT=3000
          FASTAPI_PORT=8000
          EOF

      - name: Run Playwright tests
        working-directory: examples/e2e-tests
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: examples/e2e-tests/playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: examples/e2e-tests/test-results/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'examples/e2e-tests/test-results/results.json';

            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const passed = results.suites.reduce((acc, suite) => acc + suite.specs.filter(s => s.ok).length, 0);
              const failed = results.suites.reduce((acc, suite) => acc + suite.specs.filter(s => !s.ok).length, 0);
              const total = passed + failed;

              const body = `## E2E Test Results

              ${failed === 0 ? '✅' : '❌'} **${passed}/${total}** tests passed

              ${failed > 0 ? `\n### Failed Tests\n${failed} test(s) failed. Check the [test report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.` : ''}

              📊 [View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
